<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <link rel="stylesheet" href="css.css" />
</head>
<body>

<div id="menu" class="screen active">
  <h1>Car Track Builder</h1>
  <button class="btn" onclick="newMap()">Nova mapa</button>

  <div class="map-list-wrap">
    <p class="list-label">Ulozene mapy:</p>
    <div id="mapList" class="map-list"></div>
  </div>

  <label class="btn btn-secondary">
    Import
    <input type="file" id="importInput" accept=".json" onchange="importMap(event)" hidden />
  </label>
</div>

<div id="editor" class="screen">
  <div class="toolbar">
    <button class="btn btn-secondary" onclick="showScreen('menu')">Menu</button>
    <span id="mapName" class="map-name"></span>
    <button class="btn" onclick="saveMap()">Ulozit</button>
    <button class="btn btn-secondary" onclick="exportMap()">Export</button>
  </div>

  <div id="palette" class="palette">
    <div class="pal-btn active" style="background:#4a7c40" data-type="grass"></div>
    <div class="pal-btn" style="background:#666"    data-type="road"></div>
    <div class="pal-btn" style="background:#2a6fa8" data-type="water"></div>
    <div class="pal-btn" style="background:#c8a84b" data-type="sand"></div>
  </div>

  <div id="grid" class="grid"></div>
</div>

<script src="js.js"></script>
</body>
</html>
